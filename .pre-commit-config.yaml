# Git-level deterministic guardrail (research Pillar 3). Where the Claude Code
# PostToolUse hook catches issues as the agent edits, pre-commit is the backstop
# at commit time — nothing lands in a commit until these pass. Enable once with
# `uv run pre-commit install`. Pinned revs so the checks are reproducible.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files      # stop an agent committing a huge artifact
      - id: check-merge-conflict
      - id: debug-statements             # no stray breakpoint()/pdb left behind

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.1
    hooks:
      - id: uv-lock       # keep uv.lock in sync with pyproject.toml deps

  # Everything below runs through `uv run`, so pre-commit uses the SAME pinned
  # tool versions as the editor hook and CI — no "passes in the hook, fails at
  # commit" skew from a separately-pinned mirror. Single source of truth = uv.lock.
  - repo: local
    hooks:
      # --force-exclude: pre-commit passes explicit file paths, and ruff ignores
      # `extend-exclude` for explicitly-listed files unless forced — without this,
      # vulture_whitelist.py (excluded in pyproject) gets linted and fails F821.
      - id: ruff          # lint + auto-fix (rules + rationale live in pyproject.toml)
        name: ruff
        entry: uv run ruff check --fix --force-exclude
        language: system
        types: [python]
      - id: ruff-format   # format
        name: ruff-format
        entry: uv run ruff format --force-exclude
        language: system
        types: [python]
      - id: mypy          # strict types — the type oracle, too slow for the editor hook
        name: mypy
        entry: uv run mypy src app.py
        language: system
        types: [python]
        pass_filenames: false
      - id: vulture       # unreachable/dead code ruff can't detect
        name: vulture
        entry: uv run vulture
        language: system
        types: [python]
        pass_filenames: false
