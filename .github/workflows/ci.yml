name: CI

# The verification gate. This is the same loop an agent runs locally, enforced on
# every push and PR — the deterministic oracle that keeps AI-authored code honest.
# Keep these steps identical to CLAUDE.md's "Verification loop" so local == CI.
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      # --locked fails if uv.lock is stale, so an agent can't quietly drift deps.
      - run: uv sync --locked

      - run: uv run ruff check .

      - run: uv run ruff format --check .

      - run: uv run mypy src

      # Unreachable/dead functions that ruff's unused-import checks can't see.
      - run: uv run vulture

      # Dependency CVE scan — catches a vulnerable package an agent might add.
      - run: uv run pip-audit

      - run: uv run pytest --cov
