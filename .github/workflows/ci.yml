name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv sync --locked

      - run: uv run ruff check .

      - run: uv run ruff format --check .

      - run: uv run mypy src

      - run: uv run vulture

      - run: uv run pytest --cov
