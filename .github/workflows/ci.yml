name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    strategy:
      # Run both versions to completion so a floor-only break is visible.
      fail-fast: false
      matrix:
        # Support floor (3.12), dev version (3.13), and newest release (3.14);
        # see pyproject requires-python. Floor and newest both gate every PR.
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked

      # The full gate, same commands as CLAUDE.md and pre-commit, one step each
      # so the GitHub UI points at the exact check that failed.
      - name: Lint
        run: uv run ruff check src tests
      - name: Format
        run: uv run ruff format --check src tests
      - name: Types
        run: uv run mypy src
      - name: Dead code
        run: uv run vulture
      - name: Dependency audit
        run: uv run pip-audit
      - name: Tests
        run: uv run pytest --cov
